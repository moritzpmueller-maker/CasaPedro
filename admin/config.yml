                  - { label: "Fernet / Ramazotti",        name: fernet_ramazotti,              widget: string }
                  - { label: "Wodka / Tequila",           name: wodka_tequila,                 widget: string }
                  - { label: "Gin",                       name: gin,                           widget: string }
                  - { label: "Anis",                      name: anis,                          widget: string }
                  - { label: "Licor 43",                  name: licor_43,                      widget: string }
                  - { label: "Yerbas",                    name: yerbas,                        widget: string }
                  - { label: "Ponche",                    name: ponche,                        widget: string }
