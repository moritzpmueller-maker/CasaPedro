                  - { label: "Cappuccino / Café con leche", name: cappuccino_cafe_leche, widget: string }
                  - { label: "Cortado",                name: cortado,               widget: string }
                  - { label: "Café solo",              name: cafe_solo,             widget: string }
                  - { label: "Café solo doble",        name: cafe_solo_doble,       widget: string }
                  - { label: "Carajillo",              name: carajillo,             widget: string }
                  - { label: "Té",                     name: te,                    widget: string }
