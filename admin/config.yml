                  - { label: "Bier alkoholfrei 0,33 l",   name: bier_alkoholfrei_033,          widget: string }
                  - { label: "Alt 0,33 l",                name: bier_alt_033,                  widget: string }
                  - { label: "Estrella 0,33 l",           name: estrella_033,                  widget: string }
                  - { label: "Bitburger Pils 0,25 l",     name: bitburger_025,                 widget: string }
                  - { label: "Bitburger Pils 0,5 l",      name: bitburger_05,                  widget: string }
                  - { label: "Hofbräu Weisse 0,5 l",      name: hofbrau_weisse_05,             widget: string }
                  - { label: "Hofbräu Weisse alkoholfrei",name: hofbrau_weisse_alkoholfrei_05, widget: string }
                  - { label: "Sangría Copa 0,25 l",       name: sangria_copa_025,              widget: string }
                  - { label: "Sangría Jarra 0,5 l",       name: sangria_jarra_05,              widget: string }
